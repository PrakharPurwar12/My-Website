<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Bargain Hunter Bot app preview</title>
  <desc id="desc">A light chatbot interface with title, clear chat button, conversation panel, and message input.</desc>
  <rect width="1600" height="900" rx="28" fill="#eeeff2" />

  <g>
    <rect x="450" y="210" width="700" height="450" rx="24" fill="#f7f7f8" />
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#111827" flood-opacity="0.14" />
    </filter>
    <rect x="450" y="210" width="700" height="450" rx="24" fill="#f7f7f8" filter="url(#shadow)" />
  </g>

  <g font-family="Arial, sans-serif">
    <text x="490" y="286" font-size="30">🤖</text>
    <text x="540" y="286" font-size="28" font-weight="700" fill="#0f172a">Bargain Hunter Bot</text>
    <rect x="1030" y="240" width="96" height="34" rx="10" fill="#ef4444" />
    <text x="1078" y="263" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">Clear Chat</text>
  </g>

  <g>
    <rect x="478" y="308" width="644" height="136" rx="10" fill="#f9fafb" stroke="#ff3b30" />
    <rect x="496" y="336" width="492" height="84" rx="18" fill="#d1d5db" />
  </g>

  <g font-family="Arial, sans-serif" fill="#0f172a">
    <text x="514" y="370" font-size="18" font-weight="700">Bot:</text>
    <text x="554" y="370" font-size="18">Hello! Welcome to Bargain Hunter Bot. Ask me about</text>
    <text x="514" y="398" font-size="18">deals (e.g., 'best mobile deals') or say hi!</text>
  </g>

  <g>
    <rect x="478" y="576" width="568" height="52" rx="12" fill="#f8fafc" stroke="#c7cdd7" />
    <rect x="1054" y="576" width="68" height="52" rx="12" fill="#4f46e5" />
    <path d="M1082 602l-10-6 3 10 7-4zm0 0 13 0" fill="#ffffff" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <text x="494" y="611" font-family="Arial, sans-serif" font-size="16" fill="#94a3b8">
    Type your query (e.g., 'best laptop deals')...
  </text>
</svg>
