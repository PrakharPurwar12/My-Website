<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Car Price Prediction ML Model app preview</title>
  <desc id="desc">A light machine learning app preview with sidebar, title, form controls, and sliders.</desc>
  <rect width="1600" height="900" rx="28" fill="#f3f4f6" />

