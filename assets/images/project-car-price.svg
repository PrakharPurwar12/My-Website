    <text x="22" y="218" font-size="18">inputs below to specify the car's</text>
    <text x="22" y="250" font-size="18">details and get an estimated price.</text>

    <text x="22" y="476" font-size="14" fill="#6b7280">Drive to Prediction 🚗</text>
