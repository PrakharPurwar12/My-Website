<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Retail sales dashboard preview</title>
  <desc id="desc">A dark analytics dashboard preview with KPI cards and charts.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a2540" />
      <stop offset="100%" stop-color="#071523" />
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#15324f" />
      <stop offset="100%" stop-color="#0d2236" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#31a6ff" />
      <stop offset="100%" stop-color="#1f7ef0" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#1f7ef0" flood-opacity="0.35" />
    </filter>
  </defs>
  <rect width="1200" height="720" rx="34" fill="url(#bg)" />
  <text x="600" y="72" fill="#f8fafc" font-family="Arial, sans-serif" font-size="34" font-weight="700" text-anchor="middle">Retail Sales Performance Dashboard</text>
  <text x="600" y="110" fill="#dbeafe" font-family="Arial, sans-serif" font-size="19" font-weight="600" text-anchor="middle">Analysis of customer and sales performance (2023-2025)</text>

  <g filter="url(#glow)">
    <rect x="34" y="138" width="218" height="108" rx="24" fill="url(#panel)" stroke="#2857ff" stroke-opacity="0.18" />
    <rect x="270" y="138" width="218" height="108" rx="24" fill="url(#panel)" stroke="#2857ff" stroke-opacity="0.18" />
    <rect x="506" y="138" width="218" height="108" rx="24" fill="url(#panel)" stroke="#2857ff" stroke-opacity="0.18" />
    <rect x="742" y="138" width="218" height="108" rx="24" fill="url(#panel)" stroke="#2857ff" stroke-opacity="0.18" />
  </g>

  <g fill="#f8fafc" font-family="Arial, sans-serif" font-weight="700">
