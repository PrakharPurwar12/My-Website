  <circle cx="1072" cy="626" r="44" fill="none" stroke="#2334b8" stroke-width="20" stroke-dasharray="60 216" stroke-dashoffset="-95" transform="rotate(-90 1072 626)" />
  <circle cx="1072" cy="626" r="44" fill="none" stroke="#f27932" stroke-width="20" stroke-dasharray="44 232" stroke-dashoffset="-160" transform="rotate(-90 1072 626)" />
  <circle cx="1072" cy="626" r="44" fill="none" stroke="#a21caf" stroke-width="20" stroke-dasharray="30 246" stroke-dashoffset="-208" transform="rotate(-90 1072 626)" />
