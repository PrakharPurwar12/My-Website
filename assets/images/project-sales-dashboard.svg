  <circle cx="206" cy="586" r="70" fill="none" stroke="#2488e8" stroke-width="36" stroke-dasharray="190 310" transform="rotate(-90 206 586)" />
  <circle cx="206" cy="586" r="70" fill="none" stroke="#2334b8" stroke-width="36" stroke-dasharray="116 384" stroke-dashoffset="-198" transform="rotate(-90 206 586)" />
  <circle cx="206" cy="586" r="70" fill="none" stroke="#f27932" stroke-width="36" stroke-dasharray="104 396" stroke-dashoffset="-318" transform="rotate(-90 206 586)" />

