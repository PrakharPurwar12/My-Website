    <text x="74" y="222" font-size="18">Total Revenue</text>
    <text x="310" y="194" font-size="34">1.40K</text>
    <text x="310" y="222" font-size="18">Avg Orders</text>
    <text x="546" y="194" font-size="34">293K</text>
    <text x="546" y="222" font-size="18">Total Orders</text>
    <text x="782" y="194" font-size="34">87K</text>
    <text x="782" y="222" font-size="18">Unique Users</text>
  </g>

  <rect x="978" y="48" width="188" height="198" rx="26" fill="#07192a" stroke="#12395d" />
  <text x="1072" y="82" fill="#f8fafc" font-family="Arial, sans-serif" font-size="19" font-weight="700" text-anchor="middle">Quarter</text>
  <g fill="#f8fafc" font-family="Arial, sans-serif" font-size="18">
    <rect x="996" y="96" width="72" height="46" rx="12" fill="#f1f5f9" />
    <rect x="1078" y="96" width="72" height="46" rx="12" fill="#f1f5f9" />
    <rect x="996" y="152" width="72" height="46" rx="12" fill="#f1f5f9" />
    <rect x="1078" y="152" width="72" height="46" rx="12" fill="#f1f5f9" />
